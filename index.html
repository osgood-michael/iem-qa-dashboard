<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEM QA Dashboard</title>
  <link rel="icon" href="https://www.google.com/s2/favicons?domain=iemfg.com&sz=64" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1><span>IEM</span><span class="divider">|</span>QA Dashboard</h1>
    <div class="stats">
      <div class="stat"><strong id="totalCount">0</strong> bookmarks</div>
      <div class="stat"><strong id="catCount">0</strong> categories</div>
      <div class="stat"><strong id="visibleCount">0</strong> showing</div>
    </div>
  </div>
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search bookmarks by name, URL, or note..." autofocus>
  </div>
</div>

<div class="filters" id="filterBar"></div>
<div class="main" id="main"></div>

<script src="js/app.js"></script>
</body>
</html>
